<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Skyesports Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0c10;
  --bg2: #111318;
  --bg3: #1a1d26;
  --bg4: #222636;
  --border: #2a2f45;
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --accent3: #10b981;
  --warn: #f59e0b;
  --danger: #ef4444;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* ─── Layout ─────────────────────────── */
#app { display: flex; height: 100vh; overflow: hidden; }
#sidebar { width: 240px; min-width: 240px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: all .3s; z-index: 100; }
#sidebar.collapsed { width: 60px; min-width: 60px; }
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 20px; height: 56px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
#content { flex: 1; overflow-y: auto; padding: 24px; }

/* ─── Sidebar ────────────────────────── */
.logo { padding: 16px 16px 12px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.logo-text { font-family: 'Rajdhani', sans-serif; font-size: 17px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; }
.logo-sub { font-size: 10px; color: var(--text3); font-weight: 400; display: block; }

nav { flex: 1; padding: 12px 8px; overflow-y: auto; }
.nav-section { margin-bottom: 4px; }
.nav-label { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; padding: 8px 8px 4px; white-space: nowrap; overflow: hidden; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer; transition: all .2s; color: var(--text2); font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; position: relative; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(0, 212, 255, 0.12); color: var(--accent); }
.nav-item.active::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px; background: var(--accent); border-radius: 0 2px 2px 0; }
.nav-icon { font-size: 16px; flex-shrink: 0; width: 20px; text-align: center; }
.nav-badge { margin-left: auto; background: var(--danger); color: white; border-radius: 10px; padding: 1px 6px; font-size: 11px; font-weight: 600; }

.sidebar-footer { padding: 12px 8px; border-top: 1px solid var(--border); }
.user-card { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 8px; cursor: pointer; }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
.user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 11px; color: var(--text3); }

/* ─── Topbar ─────────────────────────── */
.menu-btn { background: none; border: none; color: var(--text2); cursor: pointer; padding: 6px; border-radius: 6px; font-size: 18px; }
.menu-btn:hover { background: var(--bg3); color: var(--text); }
.topbar-title { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); flex: 1; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }
.search-wrap { position: relative; }
.search-wrap input { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 7px 12px 7px 36px; font-size: 13px; width: 220px; outline: none; transition: all .2s; }
.search-wrap input:focus { border-color: var(--accent); width: 280px; }
.search-wrap .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; }
.icon-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: all .2s; position: relative; }
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }
.notif-dot { position: absolute; top: 4px; right: 4px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; border: 2px solid var(--bg2); }

/* ─── Cards / Components ──────────────── */
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.card-title { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; color: var(--text); }

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; overflow: hidden; transition: transform .2s; }
.stat-card:hover { transform: translateY(-2px); }
.stat-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.stat-card.blue::after { background: var(--accent); }
.stat-card.green::after { background: var(--accent3); }
.stat-card.purple::after { background: var(--accent2); }
.stat-card.yellow::after { background: var(--warn); }
.stat-card.red::after { background: var(--danger); }
.stat-icon { font-size: 28px; margin-bottom: 12px; }
.stat-value { font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700; color: var(--text); }
.stat-label { font-size: 12px; color: var(--text3); margin-top: 2px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }

/* ─── Table ──────────────────────────── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: var(--bg3); color: var(--text3); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody tr { border-bottom: 1px solid rgba(42,47,69,0.5); transition: background .15s; cursor: pointer; }
tbody tr:hover { background: var(--bg3); }
tbody td { padding: 12px 14px; color: var(--text2); vertical-align: middle; }
tbody td .asset-name { color: var(--text); font-weight: 500; }

/* ─── Badges ─────────────────────────── */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: capitalize; }
.badge-available { background: rgba(16,185,129,0.15); color: #10b981; border: 1px solid rgba(16,185,129,0.2); }
.badge-in-use { background: rgba(0,212,255,0.12); color: var(--accent); border: 1px solid rgba(0,212,255,0.2); }
.badge-maintenance { background: rgba(245,158,11,0.15); color: var(--warn); border: 1px solid rgba(245,158,11,0.2); }
.badge-retired { background: rgba(100,116,139,0.2); color: var(--text3); border: 1px solid rgba(100,116,139,0.2); }
.badge-lost { background: rgba(239,68,68,0.15); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
.badge-new { background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.2); }
.badge-excellent { background: rgba(16,185,129,0.15); color: #10b981; }
.badge-good { background: rgba(0,212,255,0.12); color: var(--accent); }
.badge-fair { background: rgba(245,158,11,0.15); color: var(--warn); }
.badge-poor { background: rgba(239,68,68,0.15); color: var(--danger); }
.badge-admin { background: rgba(239,68,68,0.15); color: var(--danger); }
.badge-assistant { background: rgba(0,212,255,0.12); color: var(--accent); }
.badge-viewer { background: rgba(100,116,139,0.2); color: var(--text2); }

/* ─── Buttons ────────────────────────── */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; text-decoration: none; }
.btn-primary { background: linear-gradient(135deg, var(--accent), #0099bb); color: #000; }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,212,255,0.3); }
.btn-secondary { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: var(--danger); }
.btn-danger:hover { background: var(--danger); color: white; }
.btn-success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: var(--accent3); }
.btn-success:hover { background: var(--accent3); color: white; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { padding: 7px; }

/* ─── Forms ──────────────────────────── */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
.form-full { grid-column: 1 / -1; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group select, .form-group textarea {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  border-radius: 8px; padding: 9px 12px; font-size: 13px; outline: none;
  transition: border-color .2s; font-family: inherit; width: 100%;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--accent); }
.form-group select option { background: var(--bg2); }
.form-group textarea { resize: vertical; min-height: 80px; }

/* ─── Modal ──────────────────────────── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
.modal-lg { max-width: 900px; }
.modal-sm { max-width: 420px; }
.modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-title { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; }
.modal-body { padding: 24px; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
.close-btn { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 20px; padding: 4px; border-radius: 4px; }
.close-btn:hover { color: var(--text); }

/* ─── Filters bar ────────────────────── */
.filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
.filter-select { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 7px 12px; font-size: 13px; outline: none; cursor: pointer; }
.filter-select:focus { border-color: var(--accent); }

/* ─── Section header ─────────────────── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.section-title { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; }

/* ─── QR scanner ─────────────────────── */
#scanner-video { width: 100%; border-radius: 8px; max-height: 280px; object-fit: cover; }
.scanner-wrap { position: relative; }
.scanner-line { position: absolute; left: 10%; right: 10%; height: 2px; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: scan 2s linear infinite; top: 20%; }
@keyframes scan { 0%,100% { top: 20%; } 50% { top: 75%; } }

/* ─── Tabs ───────────────────────────── */
.tabs { display: flex; gap: 4px; background: var(--bg3); border-radius: 10px; padding: 4px; margin-bottom: 20px; }
.tab { padding: 7px 14px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text3); transition: all .2s; }
.tab.active { background: var(--bg2); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

/* ─── Toast ──────────────────────────── */
.toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; min-width: 280px; max-width: 400px; display: flex; align-items: center; gap: 10px; font-size: 13px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); animation: slideIn .3s ease; }
.toast.success { border-color: rgba(16,185,129,0.3); }
.toast.error { border-color: rgba(239,68,68,0.3); }
.toast.warning { border-color: rgba(245,158,11,0.3); }
@keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ─── Activity feed ──────────────────── */
.activity-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(42,47,69,0.4); }
.activity-item:last-child { border-bottom: none; }
.activity-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); margin-top: 5px; flex-shrink: 0; }
.activity-content { flex: 1; }
.activity-action { font-size: 13px; color: var(--text2); }
.activity-action strong { color: var(--text); }
.activity-time { font-size: 11px; color: var(--text3); margin-top: 2px; }

/* ─── Charts ─────────────────────────── */
.bar-chart { display: flex; flex-direction: column; gap: 8px; }
.bar-item { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 12px; color: var(--text2); width: 130px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; background: var(--bg3); border-radius: 4px; height: 8px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
.bar-count { font-size: 12px; color: var(--text3); width: 30px; text-align: right; }

/* ─── Asset detail ───────────────────── */
.asset-hero { display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
.asset-qr { width: 120px; height: 120px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
.asset-qr img { width: 100%; height: 100%; }
.asset-info { flex: 1; }
.asset-id-tag { font-family: 'Rajdhani', sans-serif; font-size: 13px; color: var(--accent); letter-spacing: 1px; font-weight: 700; }
.asset-title { font-family: 'Rajdhani', sans-serif; font-size: 24px; font-weight: 700; margin: 4px 0; }

/* ─── Empty state ────────────────────── */
.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 15px; font-weight: 500; color: var(--text2); }
.empty-sub { font-size: 13px; margin-top: 6px; }

/* ─── Responsive ─────────────────────── */
@media (max-width: 768px) {
  #sidebar { position: fixed; top: 0; left: -240px; height: 100vh; }
  #sidebar.mobile-open { left: 0; box-shadow: 0 0 40px rgba(0,0,0,0.6); }
  #content { padding: 16px; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .search-wrap input { width: 160px; }
  .modal { margin: 10px; }
}
@media (max-width: 480px) {
  .stat-grid { grid-template-columns: 1fr; }
  .search-wrap { display: none; }
}

/* ─── Pagination ─────────────────────── */
.pagination { display: flex; align-items: center; gap: 4px; margin-top: 16px; }
.page-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
.page-btn:hover, .page-btn.active { border-color: var(--accent); color: var(--accent); }

/* ─── Login ──────────────────────────── */
#login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9000; }
.login-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 12px; }
.login-logo h1 { font-family: 'Rajdhani', sans-serif; font-size: 26px; font-weight: 700; color: var(--accent); }
.login-logo p { font-size: 13px; color: var(--text3); margin-top: 4px; }
.login-card .btn-primary { width: 100%; justify-content: center; padding: 12px; font-size: 15px; margin-top: 8px; }

/* loading */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: currentColor; border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🎮</div>
      <h1>SKYESPORTS</h1>
      <p>Broadcast Inventory Management</p>
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="Enter username" value="admin">
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Enter password" value="pass">
    </div>
    <div id="login-err" style="color:var(--danger);font-size:13px;margin-bottom:10px;display:none"></div>
    <button class="btn btn-primary" onclick="doLogin()">
      <span>Sign In</span>
    </button>
  </div>
</div>

<!-- App -->
<div id="app" style="display:none">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="logo">
      <div class="logo-icon">🎮</div>
      <div class="logo-text">SKYESPORTS<span class="logo-sub">Inventory System</span></div>
    </div>
    <nav>
      <div class="nav-section">
        <div class="nav-label">Main</div>
        <div class="nav-item active" onclick="nav('dashboard')">
          <span class="nav-icon">📊</span><span>Dashboard</span>
        </div>
        <div class="nav-item" onclick="nav('assets')">
          <span class="nav-icon">📦</span><span>Assets</span>
        </div>
        <div class="nav-item" onclick="nav('scan')">
          <span class="nav-icon">📷</span><span>Scan / Lookup</span>
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-label">Operations</div>
        <div class="nav-item" onclick="nav('checkouts')">
          <span class="nav-icon">↩️</span><span>Checkouts</span>
        </div>
        <div class="nav-item" onclick="nav('maintenance')">
          <span class="nav-icon">🔧</span><span>Maintenance</span>
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-label">Config</div>
        <div class="nav-item" onclick="nav('categories')">
          <span class="nav-icon">🗂️</span><span>Categories</span>
        </div>
        <div class="nav-item" onclick="nav('locations')">
          <span class="nav-icon">📍</span><span>Locations</span>
        </div>
        <div class="nav-item admin-only" onclick="nav('users')">
          <span class="nav-icon">👥</span><span>Users</span>
        </div>
      </div>
      <div class="nav-section">
        <div class="nav-label">Data</div>
        <div class="nav-item" onclick="nav('import-export')">
          <span class="nav-icon">📤</span><span>Import / Export</span>
        </div>
        <div class="nav-item admin-only" onclick="nav('audit')">
          <span class="nav-icon">📋</span><span>Audit Log</span>
        </div>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="user-avatar" id="user-avatar">A</div>
        <div style="overflow:hidden">
          <div class="user-name" id="user-name">Admin</div>
          <div class="user-role" id="user-role">administrator</div>
        </div>
        <button class="btn btn-sm btn-secondary btn-icon" onclick="logout()" title="Logout" style="margin-left:auto">🚪</button>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div class="topbar-actions">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="global-search" placeholder="Search assets…" oninput="globalSearch(this.value)" onkeydown="if(event.key==='Enter')nav('assets')">
        </div>

<!-- Toast container -->
<div class="toast-container" id="toasts"></div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('sky_token') || '';
let CURRENT_USER = JSON.parse(localStorage.getItem('sky_user') || 'null');
let CURRENT_PAGE = 'dashboard';
let SCAN_STREAM = null;
let assetPage = 1;
let assetFilters = {};

// ─── API Helper ───────────────────────────────────────────────────────────────
async function api(method, path, body, isForm = false) {
  const opts = {
    method,
    headers: { Authorization: `Bearer ${TOKEN}` }
  };
  if (body && !isForm) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  } else if (body && isForm) {
    opts.body = body;
  }
  const r = await fetch('/api' + path, opts);
  if (r.status === 401) { logout(); return null; }
  const data = await r.json().catch(() => ({}));
  if (!r.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ─── Auth ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  try {
    const data = await api('POST', '/auth/login', { username: u, password: p });
    TOKEN = data.token;
    CURRENT_USER = data.user;
    localStorage.setItem('sky_token', TOKEN);
    localStorage.setItem('sky_user', JSON.stringify(CURRENT_USER));
    showApp();
  } catch (e) {
    const err = document.getElementById('login-err');
    err.textContent = e.message;
    err.style.display = 'block';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin();
});

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-avatar').textContent = (CURRENT_USER.full_name || CURRENT_USER.username)[0].toUpperCase();
  document.getElementById('user-name').textContent = CURRENT_USER.full_name || CURRENT_USER.username;
  document.getElementById('user-role').textContent = CURRENT_USER.role;
  if (CURRENT_USER.role !== 'admin') document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
  nav('dashboard');
}

async function logout() {
  await api('POST', '/auth/logout');
  TOKEN = ''; CURRENT_USER = null;
  localStorage.removeItem('sky_token'); localStorage.removeItem('sky_user');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ─── Navigation ───────────────────────────────────────────────────────────────
const PAGE_TITLES = { dashboard: 'Dashboard', assets: 'Assets', scan: 'Scan & Lookup',
  checkouts: 'Checkouts', maintenance: 'Maintenance', categories: 'Categories',
  locations: 'Locations', users: 'User Management', 'import-export': 'Import & Export', audit: 'Audit Log' };

function nav(page, data) {
  CURRENT_PAGE = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll(`.nav-item`).forEach(el => {
    if (el.getAttribute('onclick')?.includes(`'${page}'`)) el.classList.add('active');
  });
  document.getElementById('page-title').textContent = PAGE_TITLES[page] || page;
  stopScan();
  const pages = { dashboard: renderDashboard, assets: renderAssets, scan: renderScan,
    checkouts: renderCheckouts, maintenance: renderMaintenance, categories: renderCategories,
    locations: renderLocations, users: renderUsers, 'import-export': renderImportExport, audit: renderAudit };
  if (pages[page]) pages[page](data);
}

function toggleSidebar() {
  const s = document.getElementById('sidebar');
  if (window.innerWidth <= 768) s.classList.toggle('mobile-open');
  else s.classList.toggle('collapsed');
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, type = 'info') {
  const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function showModal(html, size = '') {
  closeModal();
  const ov = document.createElement('div');
  ov.className = 'modal-overlay'; ov.id = 'modal-overlay';
  ov.innerHTML = `<div class="modal ${size}">${html}</div>`;
  ov.addEventListener('click', e => { if (e.target === ov) closeModal(); });
  document.body.appendChild(ov);
}
function closeModal() {
  document.getElementById('modal-overlay')?.remove();
}

// ─── Format helpers ───────────────────────────────────────────────────────────
function fmtDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' }); }
function fmtMoney(n) { if (!n) return '—'; return '₹' + Number(n).toLocaleString('en-IN'); }
function fmtTime(d) { if (!d) return ''; const dt = new Date(d); const now = new Date(); const diff = (now - dt) / 1000; if (diff < 60) return 'just now'; if (diff < 3600) return Math.floor(diff/60) + 'm ago'; if (diff < 86400) return Math.floor(diff/3600) + 'h ago'; return fmtDate(d); }
function statusBadge(s) { return `<span class="badge badge-${s}">${s.replace('-',' ')}</span>`; }
function condBadge(c) { return `<span class="badge badge-${c}">${c}</span>`; }

// ─── Assets ───────────────────────────────────────────────────────────────────

    <div class="section-header">

      </div>
    </div>
    <div class="filters">
      <input type="text" class="filter-select" id="search-input" placeholder="🔍 Search name, ID, serial…" value="${assetFilters.search||''}" oninput="debSearch(this.value)" style="width:220px">

let searchTimer;
function debSearch(v) { clearTimeout(searchTimer); searchTimer = setTimeout(() => { assetFilters.search = v; assetFilters.page = 1; loadAssets(); }, 400); }
function globalSearch(v) { assetFilters.search = v; }

async function loadAssets() {
  const p = assetFilters.page || 1;
  const params = new URLSearchParams({ page: p, limit: 20, ...assetFilters });
  const data = await api('GET', '/assets?' + params);
  if (!data) return;

  const tableEl = document.getElementById('asset-table');
  if (!tableEl) return;

  if (!data.assets.length) {
    tableEl.innerHTML = `<div class="empty"><div class="empty-icon">📦</div><div class="empty-text">No assets found</div><div class="empty-sub">Try adjusting your filters</div></div>`;
    return;
  }

  tableEl.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Asset ID</th><th>Name</th><th>Category</th><th>Location</th>
          <th>Status</th><th>Condition</th><th>Value</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${data.assets.map(a => `
            <tr onclick="viewAsset(${a.id})">
              <td><code style="color:var(--accent);font-size:12px">${a.asset_id}</code></td>
              <td>
                <div class="asset-name">${a.name}</div>
                <div style="font-size:11px;color:var(--text3)">${a.manufacturer||''} ${a.model||''}</div>
              </td>
              <td><span style="color:${a.category_color}">${a.category_icon||'📦'} ${a.category_name||'—'}</span></td>
              <td style="font-size:12px">📍 ${a.location_name||'—'}</td>
              <td>${statusBadge(a.status)}</td>
              <td>${condBadge(a.condition)}</td>
              <td style="font-size:12px">${fmtMoney(a.purchase_price)}</td>
              <td onclick="event.stopPropagation()">
                <div style="display:flex;gap:4px">
                  <button class="btn btn-secondary btn-sm btn-icon" onclick="viewAsset(${a.id})" title="View">👁️</button>
                  ${CURRENT_USER.role!=='viewer'?`<button class="btn btn-secondary btn-sm btn-icon" onclick="editAsset(${a.id})" title="Edit">✏️</button>`:''}
                  ${a.status==='available'&&CURRENT_USER.role!=='viewer'?`<button class="btn btn-success btn-sm btn-icon" onclick="showCheckout(${a.id},'${a.name.replace(/'/g,"\\'")}',${a.id})" title="Check Out">↗️</button>`:''}
                </div>
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div style="padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border)">
      <div style="font-size:12px;color:var(--text3)">Showing ${((p-1)*20)+1}–${Math.min(p*20,data.total)} of ${data.total}</div>
      <div class="pagination">
        ${Array.from({length:Math.min(data.pages,10)},(_,i)=>i+1).map(pg=>`
          <button class="page-btn ${pg===p?'active':''}" onclick="assetFilters.page=${pg};loadAssets()">${pg}</button>`).join('')}
      </div>
    </div>
  `;
}

// ─── Asset Detail / Edit / Add ────────────────────────────────────────────────

                <div class="activity-action"><strong>${h.changed_by_name||'System'}</strong>: ${h.action} ${h.notes?'· '+h.notes:''}</div>

// ─── QR Scanner ───────────────────────────────────────────────────────────────
function renderScan() {
  document.getElementById('content').innerHTML = `
    <div class="section-header"><div class="section-title">Scan & Lookup</div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:900px">
      <div class="card">
        <div class="card-title" style="margin-bottom:16px">📷 QR/Barcode Scanner</div>
        <div class="scanner-wrap">
          <video id="scanner-video" autoplay playsinline></video>
          <div class="scanner-line"></div>
        </div>
        <div style="margin-top:12px;display:flex;gap:8px">
          <button class="btn btn-primary" onclick="startScan()" id="start-scan-btn">▶ Start Camera</button>
          <button class="btn btn-secondary" onclick="stopScan()">⏹ Stop</button>
        </div>
        <div id="scan-result" style="margin-top:12px"></div>
        <div style="margin-top:16px;border-top:1px solid var(--border);padding-top:16px">
          <div style="font-size:12px;color:var(--text3);margin-bottom:8px">Or use a USB barcode scanner (plug in and scan directly):</div>
          <input id="barcode-input" class="form-group input" style="width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-size:13px;outline:none" placeholder="Scan barcode here…" onchange="lookupBarcode(this.value)" autofocus>
        </div>
      </div>
      <div class="card">
        <div class="card-title" style="margin-bottom:16px">🔍 Manual Lookup</div>
        <div class="form-group" style="margin-bottom:12px">
          <label>Asset ID / Barcode / Serial</label>
          <input id="manual-search" placeholder="e.g. SKY-0001 or barcode" onkeydown="if(event.key==='Enter')manualLookup()">
        </div>
        <button class="btn btn-primary" onclick="manualLookup()" style="margin-bottom:16px">🔍 Lookup</button>
        <div id="lookup-result"></div>
      </div>
    </div>
  `;
  // Auto-focus barcode input for USB scanner
  setTimeout(() => document.getElementById('barcode-input')?.focus(), 300);
}

async function startScan() {
  try {
    SCAN_STREAM = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1280 } } });
    const video = document.getElementById('scanner-video');
    if (!video) return;
    video.srcObject = SCAN_STREAM;
    document.getElementById('start-scan-btn').textContent = '📷 Camera Active';
    
    // Use BarcodeDetector if available
    if ('BarcodeDetector' in window) {
      const detector = new BarcodeDetector({ formats: ['qr_code', 'code_128', 'ean_13', 'ean_8', 'code_39', 'data_matrix'] });
      const scan = async () => {
        if (!SCAN_STREAM) return;
        try {
          const codes = await detector.detect(video);
          if (codes.length) {
            stopScan();
            lookupBarcode(codes[0].rawValue);
            return;
          }
        } catch(e) {}
        if (SCAN_STREAM) requestAnimationFrame(scan);
      };
      video.onplay = () => scan();
    } else {
      document.getElementById('scan-result').innerHTML = `<div style="font-size:12px;color:var(--warn);padding:8px;background:rgba(245,158,11,0.1);border-radius:6px">⚠️ Camera preview active. Use a USB barcode scanner or type the code below for best results.</div>`;
    }
  } catch(e) {
    toast('Camera access denied. Use USB scanner or manual lookup.', 'warning');
  }
}

function stopScan() {
  if (SCAN_STREAM) { SCAN_STREAM.getTracks().forEach(t => t.stop()); SCAN_STREAM = null; }
}

async function lookupBarcode(code) {
  code = code.trim();
  if (!code) return;
  try {
    const asset = await api('GET', `/assets/barcode/${encodeURIComponent(code)}`);
    showScanResult(asset, 'scan-result');
    document.getElementById('barcode-input').value = '';
  } catch(e) {
    document.getElementById('scan-result').innerHTML = `<div style="color:var(--danger);font-size:13px;padding:8px">❌ Asset not found for: <strong>${code}</strong></div>`;
  }
}

async function manualLookup() {
  const code = document.getElementById('manual-search').value.trim();
  if (!code) return;
  try {
    const asset = await api('GET', `/assets/barcode/${encodeURIComponent(code)}`);
    showScanResult(asset, 'lookup-result');
  } catch(e) {
    document.getElementById('lookup-result').innerHTML = `<div style="color:var(--danger);font-size:13px">❌ Not found: <strong>${code}</strong></div>`;
  }
}

function showScanResult(a, targetId) {
  const el = document.getElementById(targetId);

  el.innerHTML = `

      <div style="font-size:11px;color:var(--accent);letter-spacing:1px;font-weight:700">${a.asset_id}</div>

        <div class="form-group"><label>Type</label>
          <select id="l-type">${['storage','venue','office','vehicle','other'].map(t=>`<option value="${t}" ${l.type==t?'selected':''}>${t}</option>`).join('')}</select>
        </div>
        <div class="form-group form-full"><label>Description</label><input id="l-desc" value="${l.description||''}"></div>
        <div class="form-group form-full"><label>Address</label><input id="l-addr" value="${l.address||''}"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveLoc(${loc?loc.id:'null'})">${loc?'Update':'Add'}</button>
    </div>
  `, 'modal-sm');
}

async function saveLoc(id) {
  const body = { name: document.getElementById('l-name').value, type: document.getElementById('l-type').value, description: document.getElementById('l-desc').value, address: document.getElementById('l-addr').value };
  if (!body.name) { toast('Name required', 'error'); return; }
  try {
    if (id) await api('PUT', `/locations/${id}`, body);
    else await api('POST', '/locations', body);
    toast('Saved!', 'success'); closeModal(); renderLocations();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteLoc(id) {
  if (!confirm('Delete this location?')) return;
  try { await api('DELETE', `/locations/${id}`); toast('Deleted', 'success'); renderLocations(); } catch(e) { toast(e.message, 'error'); }
}

// ─── Users ────────────────────────────────────────────────────────────────────
async function renderUsers() {
  const data = await api('GET', '/users');
  document.getElementById('content').innerHTML = `
    <div class="section-header"><div class="section-title">User Management</div>
      <button class="btn btn-primary" onclick="showUserForm()">+ Add User</button>
    </div>
    <div class="card" style="padding:0">
      <div class="table-wrap"><table>
        <thead><tr><th>User</th><th>Username</th><th>Role</th><th>Status</th><th>Last Login</th><th>Actions</th></tr></thead>
        <tbody>
          ${data.map(u=>`<tr>
            <td>
              <div style="display:flex;align-items:center;gap:10px">
                <div class="user-avatar">${(u.full_name||u.username)[0].toUpperCase()}</div>
                <div>
                  <div style="font-weight:600">${u.full_name||u.username}</div>
                  <div style="font-size:12px;color:var(--text3)">${u.email||''}</div>
                </div>
              </div>
            </td>
            <td><code style="color:var(--accent)">${u.username}</code></td>
            <td><span class="badge badge-${u.role}">${u.role}</span></td>
            <td>${u.is_active?'<span class="badge badge-available">Active</span>':'<span class="badge badge-retired">Inactive</span>'}</td>
            <td style="font-size:12px;color:var(--text3)">${fmtTime(u.last_login)||'Never'}</td>
            <td>
              <div style="display:flex;gap:4px">
                <button class="btn btn-secondary btn-sm" onclick="showUserForm(${JSON.stringify(u).replace(/"/g,'&quot;')})">✏️</button>
                ${u.id!=CURRENT_USER.id?`<button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">🗑️</button>`:''}
              </div>
            </td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>
  `;
}

function showUserForm(user) {
  const u = user || {};
  showModal(`
    <div class="modal-header"><div class="modal-title">${user?'Edit':'Add'} User</div><button class="close-btn" onclick="closeModal()">✕</button></div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label>Username *</label><input id="u-uname" value="${u.username||''}" ${user?'readonly':''}></div>
        <div class="form-group"><label>Password ${user?'(leave blank to keep)':''} *</label><input type="password" id="u-pass" placeholder="${user?'New password…':'Password'}"></div>
        <div class="form-group"><label>Full Name</label><input id="u-fname" value="${u.full_name||''}"></div>
        <div class="form-group"><label>Email</label><input type="email" id="u-email" value="${u.email||''}"></div>
        <div class="form-group"><label>Role</label>
          <select id="u-role">
            ${['admin','assistant','viewer'].map(r=>`<option value="${r}" ${u.role==r?'selected':''}>${r}</option>`).join('')}
          </select>
        </div>
        ${user?`<div class="form-group"><label>Status</label>
          <select id="u-active"><option value="1" ${u.is_active?'selected':''}>Active</option><option value="0" ${!u.is_active?'selected':''}>Inactive</option></select>
        </div>`:''}
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveUser(${user?user.id:'null'})">${user?'Update':'Add'} User</button>
    </div>
  `, 'modal-sm');
}

async function saveUser(id) {
  const body = { username: document.getElementById('u-uname').value, full_name: document.getElementById('u-fname').value, email: document.getElementById('u-email').value, role: document.getElementById('u-role').value };
  const pass = document.getElementById('u-pass').value;
  if (pass) body.password = pass;
  if (id) body.is_active = document.getElementById('u-active')?.value;
  if (!body.username || (!id && !pass)) { toast('Username and password required', 'error'); return; }
  try {
    if (id) await api('PUT', `/users/${id}`, body);
    else await api('POST', '/users', body);
    toast('User saved!', 'success'); closeModal(); renderUsers();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteUser(id) {
  if (!confirm('Deactivate this user?')) return;
  try { await api('DELETE', `/users/${id}`); toast('User deactivated', 'success'); renderUsers(); } catch(e) { toast(e.message, 'error'); }
}

// ─── Import / Export ──────────────────────────────────────────────────────────
function renderImportExport() {
  document.getElementById('content').innerHTML = `
    <div class="section-header"><div class="section-title">Import & Export</div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:800px">
      <div class="card">
        <div class="card-title" style="margin-bottom:16px">📥 Export</div>
        <p style="font-size:13px;color:var(--text3);margin-bottom:20px">Export your entire inventory to Excel/CSV for backup or editing in Google Sheets.</p>
        <button class="btn btn-primary" onclick="exportExcel()">📊 Export to Excel (.xlsx)</button>
        <div style="margin-top:12px;font-size:12px;color:var(--text3)">
          💡 Open in Google Sheets: File → Import → Upload
        </div>
      </div>
      ${CURRENT_USER.role==='admin'?`<div class="card">
        <div class="card-title" style="margin-bottom:16px">📤 Import</div>
        <p style="font-size:13px;color:var(--text3);margin-bottom:16px">Import assets from Excel or CSV. Download the template first to see the required format.</p>
        <div class="form-group" style="margin-bottom:16px">
          <label>Select Excel/CSV file</label>
          <input type="file" id="import-file" accept=".xlsx,.xls,.csv" style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--text)">
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-primary" onclick="importExcel()">📤 Import</button>
          <button class="btn btn-secondary" onclick="downloadTemplate()">📋 Template</button>
        </div>
        <div id="import-result" style="margin-top:12px"></div>
      </div>`:'<div class="card"><div class="empty"><div class="empty-icon">🔒</div><div class="empty-text">Admin only</div></div></div>'}
    </div>
  `;
}

async function exportExcel() {
  try {
    const r = await fetch('/api/export/excel', { headers: { Authorization: `Bearer ${TOKEN}` } });
    if (!r.ok) throw new Error('Export failed');
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `skyesports-inventory-${new Date().toISOString().split('T')[0]}.xlsx`;
    a.click(); URL.revokeObjectURL(url);
    toast('Exported!', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

async function importExcel() {
  const file = document.getElementById('import-file').files[0];
  if (!file) { toast('Select a file first', 'error'); return; }
  const fd = new FormData(); fd.append('file', file);
  try {
    const data = await api('POST', '/import/excel', fd, true);
    document.getElementById('import-result').innerHTML = `
      <div style="background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:8px;padding:12px">
        <div style="color:var(--accent3);font-weight:700">✅ Import Complete</div>
        <div style="font-size:13px;margin-top:6px">Imported: ${data.imported} / ${data.total}</div>
        ${data.errors.length?`<div style="color:var(--danger);font-size:12px;margin-top:6px">${data.errors.length} errors</div>`:''}
      </div>`;
    toast(`Imported ${data.imported} assets!`, 'success');
  } catch(e) { toast(e.message, 'error'); }
}

function downloadTemplate() {
  const headers = ['asset_id','name','category','location','status','condition','manufacturer','model','No_of_counts','serial_number','purchase_price','purchase_date','warranty_expiry','barcode','notes'];
  const example = ['SKY-0001','Sony ZV-E10 Camera #1','Cameras','Main Warehouse','available','excellent','Sony','ZV-E10','SN12345678','75000','2024-01-15','2025-01-15','BARCODE001','Main broadcast camera'];
  const XLSX_exp = { SheetNames: ['Assets'], Sheets: { Assets: {} } };
  // Build simple CSV
  const csv = [headers, example].map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'skyesports-import-template.csv';
  a.click(); URL.revokeObjectURL(url);
}

  const data = await api('GET', '/assets/bulk-qr');
  const modalBody = document.querySelector('.modal .modal-body');
  if (!modalBody || !data) return;
  
  modalBody.innerHTML = `
    <div style="margin-bottom:12px;display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="window.print()">🖨️ Print</button>
      <div style="font-size:13px;color:var(--text3);align-self:center">${data.length} QR codes</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px">
      ${data.map(a=>`
        <div style="background:white;border-radius:8px;padding:10px;text-align:center;color:#000">
          <img src="${a.qr}" style="width:100px;height:100px">
          <div style="font-size:10px;font-weight:700;margin-top:4px;color:#111">${a.asset_id}</div>
          <div style="font-size:9px;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${a.name}</div>
        </div>`).join('')}
    </div>
  `;
}

}
